<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fundo verde floresta -->
  <rect width="32" height="32" rx="7" fill="#1B4332"/>

  <!-- Círculo branco maior (esquerdo/centro) -->
  <circle cx="13" cy="16" r="10" fill="#FDFBF7" opacity="0.92"/>

  <!-- Círculo verde menor sobreposto (direito) -->
  <circle cx="22" cy="16" r="7" fill="#2D6A4F"/>

  <!-- "+" âmbar — barra horizontal -->
  <rect x="7" y="14.5" width="12" height="3" rx="1.5" fill="#F59E0B"/>
  <!-- "+" âmbar — barra vertical -->
  <rect x="11.5" y="10" width="3" height="12" rx="1.5" fill="#F59E0B"/>
</svg>
